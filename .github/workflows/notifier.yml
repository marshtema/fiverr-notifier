name: Fiverr Notifier

# Когда запускать робота
on:
  schedule:
    - cron: "*/10 * * * *"   # каждые 10 минут (по UTC)
  workflow_dispatch:          # + кнопка "Run workflow" для ручного запуска

# Не запускать новый прогон, пока не закончился предыдущий
concurrency:
  group: fiverr-notifier
  cancel-in-progress: false

jobs:
  check-mail:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить зависимости
        run: pip install --quiet -r requirements.txt

      - name: Проверить почту и отправить уведомления
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_ENABLED: "true"
          GEMINI_MODEL: "gemini-2.5-flash"
          NOTIFY_LANGUAGE: "ru"
          NOTIFY_UNKNOWN: "false"
          MARK_SEEN: "true"
        run: python3 main.py --once
